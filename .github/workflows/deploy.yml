name: Deploy to Cloudflare Pages

# main 브랜치 push 시 자동 deploy + 수동 트리거 지원
on:
  push:
    branches:
      - main
  workflow_dispatch:

# 동시 deploy 충돌 방지 (직전 진행 중 deploy는 살리고, 새 push는 큐로)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CLAUDE.md feedback_no_em_dash: em dash(—) 절대 금지. 발견 시 build 차단.
      # 정정: node scripts/remove-em-dash.mjs --all && git add -A && git commit
      - name: Lint - em dash 금지 (글쓰기 규칙)
        run: |
          if grep -rn '—' src/ --include='*.astro' --include='*.ts' --include='*.tsx' --include='*.json' --include='*.mdx' --include='*.md' --include='*.css' --include='*.mjs' 2>/dev/null; then
            echo ""
            echo "❌ em dash(—) 발견 - CLAUDE.md 글쓰기 규칙 위반"
            echo "   정정: node scripts/remove-em-dash.mjs --all"
            exit 1
          fi
          echo "✓ em dash 없음"

      # 의료 콘텐츠 팩트체크 보조: 효과 단정·과장·최상급 표현(의료법 56조) 자동 차단
      # 수정: 위험 표현 완화 후 재커밋. 오탐은 scripts/medical-content-lint.mjs 규칙 조정
      - name: Lint - 의료 콘텐츠 위험 표현 (의료법)
        run: node scripts/medical-content-lint.mjs --strict

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=taerim-clinic-web --branch=main --commit-message="auto deploy"

      # 배포 직후 IndexNow로 Bing·네이버 등에 전체 URL 색인 통보 (자동)
      # 키는 스크립트 기본값(public/{key}.txt) 사용. 통보 실패해도 배포는 성공 처리.
      - name: IndexNow 색인 통보 (Bing·Naver)
        run: node scripts/indexnow-submit.mjs
        continue-on-error: true

name: Deploy to Cloudflare Pages

# main 브랜치 push 시 자동 deploy + 수동 트리거 지원
on:
  push:
    branches:
      - main
  workflow_dispatch:

# 동시 deploy 충돌 방지 (직전 진행 중 deploy는 살리고, 새 push는 큐로)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write   # em dash 자가치유 커밋 push용 (2026-06-16)
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CLAUDE.md feedback_no_em_dash: em dash(—) 절대 금지.
      # 2026-06-16 자가치유 전환: 발견 시 build 차단(silent red) 대신 자동 제거 후 커밋하고 진행.
      #   em dash 제거는 기계적·안전(remove-em-dash.mjs)이라 사람 개입 불필요. 의료법 lint(아래)만 차단 유지.
      #   GITHUB_TOKEN의 push는 워크플로를 재트리거하지 않음(GitHub 기본 동작) → 무한루프 없음.
      - name: Auto-fix em dash (글쓰기 규칙 자가치유)
        run: |
          node scripts/remove-em-dash.mjs --all
          if git diff --quiet; then
            echo "✓ em dash 없음"
          else
            echo "⚠️ em dash 발견 → 자동 제거 후 커밋 (배포 차단 안 함)"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-strip em dash (CI self-heal)"
            # 커밋백은 best-effort: 빌드 트리는 이미 정리됐으므로 push가 레이스로 거부돼도 배포는 정상.
            git push origin HEAD:main || echo "⚠️ 커밋백 push 생략 (레이스/거부) - 빌드 트리 정리됨, 배포 정상 진행. 다음 빌드가 재정리."
          fi

      # 관련글(relatedPosts) 스냅샷 동기화: 소스 글 제목 교정 시 다른 글에 박힌 옛 스냅샷(stale)이
      # 남아 의료 lint를 막던 재발 방지. lint 직전에 소스 글 기준으로 자동 갱신.
      - name: Sync relatedPosts snapshots
        run: node scripts/sync-related-posts.mjs --write

      # 의료 콘텐츠 팩트체크 보조: 효과 단정·과장·최상급 표현(의료법 56조) 자동 차단
      # 수정: 위험 표현 완화 후 재커밋. 오탐은 scripts/medical-content-lint.mjs 규칙 조정
      - name: Lint - 의료 콘텐츠 위험 표현 (의료법)
        run: node scripts/medical-content-lint.mjs --strict

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=taerim-clinic-web --branch=main --commit-message="auto deploy"

      # 배포 직후 IndexNow로 Bing·네이버 등에 전체 URL 색인 통보 (자동)
      # 키는 스크립트 기본값(public/{key}.txt) 사용. 통보 실패해도 배포는 성공 처리.
      - name: IndexNow 색인 통보 (Bing·Naver)
        run: node scripts/indexnow-submit.mjs
        continue-on-error: true

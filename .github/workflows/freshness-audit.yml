name: Freshness Audit (T8)

# 매일 03:00 KST (18:00 UTC) 실행
# /api/stats의 staleCandidates (90일+ 경과) 확인 →
# N > 0이면 GitHub Issue 생성 (label: freshness-audit)

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch: # 수동 트리거 가능

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch stats
        id: stats
        run: |
          RESPONSE=$(curl -sf https://deokgye.com/api/stats)
          echo "stats<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          STALE_COUNT=$(echo "$RESPONSE" | jq '.staleCandidates | length')
          echo "stale_count=$STALE_COUNT" >> $GITHUB_OUTPUT
          echo "## Freshness Audit" >> $GITHUB_STEP_SUMMARY
          echo "- Stale candidates (90d+): $STALE_COUNT" >> $GITHUB_STEP_SUMMARY

      - name: Create issue if stale candidates exist
        if: steps.stats.outputs.stale_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const stats = JSON.parse(`${{ steps.stats.outputs.stats }}`);
            const stale = stats.staleCandidates || [];

            const body = [
              `# 🕰️ Freshness Audit — ${stale.length}개 글 갱신 필요`,
              '',
              `> 2026 GEO 기준: **3개월(90일)** 경과 글은 AI 인용률 급락.`,
              `> rules.ts의 Freshness 규칙에 따라 다음 글들을 재작성·갱신해주세요.`,
              '',
              '| # | 제목 | 카테고리 | date_modified |',
              '|---|------|---------|--------------|',
              ...stale.map((s, i) => `| ${i+1} | [${s.title}](https://deokgye.com/${s.category_slug}/${s.slug}/) | ${s.category_slug} | ${s.date_modified} |`),
              '',
              '## 권장 조치',
              '- 통계 수치 업데이트 (최신 분기 데이터로)',
              '- 새 사례/인용 추가',
              '- 기존 FAQ에 최근 질문 추가',
              '- 수정 후 `publishedAt`은 그대로, `modifiedAt`만 갱신',
              '',
              `_Auto-generated by \`.github/workflows/freshness-audit.yml\` on ${new Date().toISOString()}_`
            ].join('\n');

            // 기존 열린 이슈 있으면 덧댐, 없으면 새로 생성
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'freshness-audit',
              state: 'open',
            });

            if (existing.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
              core.notice(`Updated existing issue #${existing[0].number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🕰️ Freshness Audit — ${stale.length} articles need refresh`,
                body,
                labels: ['freshness-audit'],
              });
              core.notice(`Created issue #${created.number}`);
            }

      - name: Summary
        run: |
          echo "✅ Freshness audit 완료"
          echo "Stale: ${{ steps.stats.outputs.stale_count }}개"
